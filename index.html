<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latifa Airdrop Alert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>

  <style>
    /* ============================================================
       GLOBAL & STAGE
       ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
    }
    #root {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      perspective: 1200px; /* Critical for 3D lid opening */
    }

    .demo-controls {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 9999;
      background: rgba(0, 0, 0, 0.8); border: 1px solid #FFD700;
      padding: 12px; border-radius: 4px; font-family: 'Rajdhani', sans-serif;
    }
    .demo-controls.visible { display: block; }
    .demo-controls button {
      background: #FFD700; color: #000; border: none; padding: 6px 12px;
      margin: 2px; font-weight: 700; cursor: pointer; text-transform: uppercase;
    }

    /* ============================================================
       THE HERO ELEMENT: AIRDROP CRATE
       ============================================================ */
    .crate-stage {
      position: relative;
      width: 500px;
      height: 400px;
      transform-style: preserve-3d;
      opacity: 0; /* Hidden until GSAP starts */
    }

    /* The physical crate body */
    .crate-body {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 220px;
      background: linear-gradient(180deg, #2A2A35 0%, #1A1A24 100%);
      border: 2px solid #3A3A45;
      border-radius: 4px;
      box-shadow: 
        inset 0 0 20px rgba(0,0,0,0.8),
        0 20px 40px rgba(0,0,0,0.6);
      z-index: 10;
      overflow: hidden;
    }

    /* Rugged corner brackets */
    .crate-corner {
      position: absolute; width: 24px; height: 24px;
      background: #111; border: 2px solid #555;
      z-index: 12;
    }
    .crate-corner.tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
    .crate-corner.tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
    .crate-corner.bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
    .crate-corner.br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

    /* Caution stripes */
    .crate-stripe {
      position: absolute; top: 0; bottom: 0; width: 40px;
      background: repeating-linear-gradient(45deg, #FFD700, #FFD700 10px, #1A1A24 10px, #1A1A24 20px);
      opacity: 0.8;
      z-index: 11;
    }
    .crate-stripe.left { left: 20px; }
    .crate-stripe.right { right: 20px; }

    /* Mechanical Latches */
    .latch {
      position: absolute; top: 40%; 
      width: 30px; height: 40px;
      background: linear-gradient(90deg, #555, #888, #555);
      border: 1px solid #222;
      border-radius: 4px;
      z-index: 13;
      transform-origin: top center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    .latch.left { left: 60px; }
    .latch.right { right: 60px; }
    .latch::after {
      content: ''; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 12px; height: 12px; background: #222; border-radius: 50%;
    }

    /* The Lid (Hinged at the bottom) */
    .crate-lid {
      position: absolute;
      bottom: 220px; left: 50%;
      transform: translateX(-50%) rotateX(0deg);
      transform-origin: bottom center;
      width: 420px;
      height: 60px;
      background: linear-gradient(180deg, #3A3A45 0%, #2A2A35 100%);
      border: 2px solid #3A3A45;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      z-index: 20;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 -10px 20px rgba(0,0,0,0.3);
    }
    
    /* "DANGER / HIGH VALUE" stencil on lid */
    .lid-stencil {
      font-family: 'Black Ops One', cursive;
      font-size: 24px; color: rgba(255, 215, 0, 0.6);
      letter-spacing: 4px; text-transform: uppercase;
    }

    /* ============================================================
       THE LOOT (Interior)
       ============================================================ */
    .crate-interior {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 380px;
      height: 200px;
      z-index: 5; /* Behind the front face, revealed when lid opens */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      /* The magical glow from within */
      background: radial-gradient(ellipse at center, rgba(138, 43, 226, 0.4) 0%, rgba(0,0,0,0.9) 70%);
      border-radius: 4px;
      opacity: 0;
    }

    .loot-rarity {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #FFD700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
      opacity: 0;
      transform: translateY(20px);
    }

    .loot-name {
      font-family: 'Black Ops One', cursive;
      font-size: 36px;
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
      opacity: 0;
      transform: translateY(20px);
    }

    .loot-amount {
      font-family: 'Rajdhani', sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: #00FFFF;
      margin-top: 4px;
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
      opacity: 0;
      transform: translateY(20px);
    }

    .loot-message {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      color: #D0D0E0;
      margin-top: 8px;
      padding: 8px 16px;
      background: rgba(0,0,0,0.4);
      border-left: 3px solid #FFD700;
      max-width: 340px;
      opacity: 0;
      transform: translateY(20px);
    }

    /* ============================================================
       MEDIA PROJECTION
       ============================================================ */
    .media-hologram {
      position: absolute;
      bottom: -120px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      width: 340px;
      height: 160px;
      z-index: 8;
      opacity: 0;
      pointer-events: none;
    }
    .holo-frame {
      width: 100%; height: 100%;
      background: rgba(0, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(2px);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
    }
    .holo-frame img, .holo-frame video {
      width: 100%; height: 100%; object-fit: cover; opacity: 0.9;
    }
    /* Scanline effect for hologram */
    .holo-frame::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 255, 0.1) 51%, transparent 52%);
      background-size: 100% 4px;
      pointer-events: none;
    }

    /* ============================================================
       PIXI CANVAS
       ============================================================ */
    #particle-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 30; /* In front of crate for loot sparks */
    }
    #dust-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1; /* Behind crate for impact dust */
    }
  </style>
</head>
<body>
  <div id="root">
    <canvas id="dust-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
  </div>

  <div class="demo-controls" id="demoControls">
    <button onclick="triggerAlert(0)">Airdrop + Media</button>
    <button onclick="triggerAlert(1)">Airdrop Only</button>
  </div>

  <script>
    // ============================================================
    // DATA
    // ============================================================
    const mockDonations = [
      { name: 'SniperKing', amount: 1500, currency: 'INR', message: 'Chicken Dinner incoming! 🍗', media_url: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400' },
      { name: 'LatifaFan_99', amount: 500, currency: 'INR', message: 'Best streamer!', media_url: null }
    ];
    let currentDonation = mockDonations[0];
    let masterTimeline = null;
    let countInterval = null;
    let pixiApp = null;
    let dustApp = null;

    // ============================================================
    // PIXIJS SETUP (Dual Canvas: Dust Behind, Sparks Front)
    // ============================================================
    function initPixi() {
      const root = document.getElementById('root');
      
      // Helper to create glowing texture
      const createGlowTexture = (r, g, b) => {
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        grad.addColorStop(0, `rgba(255, 255, 255, 1)`);
        grad.addColorStop(0.2, `rgba(${r}, ${g}, ${b}, 0.8)`);
        grad.addColorStop(1, `rgba(0, 0, 0, 0)`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 64, 64);
        return PIXI.Texture.from(canvas);
      };

      const setupEmitter = (canvasId, zIndex) => {
        const app = new PIXI.Application({
          view: document.getElementById(canvasId),
          width: 800, height: 600,
          backgroundAlpha: 0, resolution: window.devicePixelRatio || 1, autoDensity: true
        });
        const container = new PIXI.Container();
        app.stage.addChild(container);
        container.x = 400; container.y = 300;

        const particles = [];
        const max = 80;
        for (let i = 0; i < max; i++) {
          const sprite = new PIXI.Sprite(createGlowTexture(255, 255, 255));
          sprite.anchor.set(0.5);
          sprite.blendMode = canvasId === 'particle-canvas' ? PIXI.BLEND_MODES.ADD : PIXI.BLEND_MODES.NORMAL;
          sprite.alpha = 0;
          container.addChild(sprite);
          particles.push({ sprite, active: false, life: 0, maxLife: 1, vx: 0, vy: 0 });
        }

        window[canvasId === 'particle-canvas' ? 'burstLoot' : 'burstDust'] = (x, y, count, color) => {
          let spawned = 0;
          particles.forEach(p => {
            if (!p.active && spawned < count) {
              p.active = true; p.life = 0; p.maxLife = 1.5 + Math.random();
              p.sprite.x = x; p.sprite.y = y;
              const angle = Math.random() * Math.PI * 2;
              const speed = canvasId === 'particle-canvas' ? 1 + Math.random() * 2 : 2 + Math.random() * 4;
              p.vx = Math.cos(angle) * speed;
              p.vy = Math.sin(angle) * speed + (canvasId === 'particle-canvas' ? -1 : 0); // Loot floats up
              p.sprite.tint = color;
              p.sprite.scale.set(canvasId === 'particle-canvas' ? 0.3 : 0.8);
              p.sprite.alpha = 1;
              spawned++;
            }
          });
        };

        app.ticker.add((delta) => {
          particles.forEach(p => {
            if (p.active) {
              p.life += delta / 60;
              p.sprite.x += p.vx * delta;
              p.sprite.y += p.vy * delta;
              const progress = p.life / p.maxLife;
              p.sprite.alpha = 1 - progress;
              p.sprite.scale.set(p.sprite.scale.x * 0.98);
              if (p.life >= p.maxLife) { p.active = false; p.sprite.alpha = 0; }
            }
          });
        });
        return app;
      };

      dustApp = setupEmitter('dust-canvas', 1);
      pixiApp = setupEmitter('particle-canvas', 30);
    }

    // ============================================================
    // RENDER SCENE
    // ============================================================
    function render(donation) {
      const symbol = { INR: '₹', USD: '$', EUR: '€', GBP: '£' }[donation.currency || 'INR'] || '₹';
      const mediaHtml = donation.media_url ? `
        <div class="media-hologram">
          <div class="holo-frame">
            <img src="${donation.media_url}" alt="media" />
          </div>
        </div>
      ` : '';

      return `
        <div class="crate-stage">
          <!-- LID -->
          <div class="crate-lid">
            <div class="lid-stencil">High Value</div>
          </div>
          
          <!-- BODY -->
          <div class="crate-body">
            <div class="crate-corner tl"></div>
            <div class="crate-corner tr"></div>
            <div class="crate-corner bl"></div>
            <div class="crate-corner br"></div>
            <div class="crate-stripe left"></div>
            <div class="crate-stripe right"></div>
            <div class="latch left"></div>
            <div class="latch right"></div>
          </div>

          <!-- INTERIOR LOOT -->
          <div class="crate-interior">
            <div class="loot-rarity">Legendary Support</div>
            <div class="loot-name">${donation.name.toUpperCase()}</div>
            <div class="loot-amount" id="lootAmount">${symbol}0</div>
            ${donation.message ? `<div class="loot-message">"${donation.message}"</div>` : ''}
          </div>

          ${mediaHtml}
        </div>
      `;
    }

    // ============================================================
    // MICRO-CINEMATIC CHOREOGRAPHY
    // ============================================================
    function showAlert(donation) {
      if (masterTimeline) masterTimeline.kill();
      clearInterval(countInterval);
      
      const root = document.getElementById('root');
      // Preserve canvases
      const dustCanvas = document.getElementById('dust-canvas');
      const pixiCanvas = document.getElementById('particle-canvas');
      root.innerHTML = '';
      root.appendChild(dustCanvas);
      root.appendChild(pixiCanvas);
      root.insertAdjacentHTML('beforeend', render(donation));

      const stage = document.querySelector('.crate-stage');
      gsap.set(stage, { opacity: 1 });

      masterTimeline = gsap.timeline({ defaults: { ease: "power3.out" } });
      const targetAmount = donation.amount;
      const symbol = { INR: '₹', USD: '$', EUR: '€', GBP: '£' }[donation.currency || 'INR'] || '₹';

      // 0.0s: THE DROP (Slam down with elastic bounce)
      masterTimeline.fromTo(".crate-stage", 
        { y: -600, rotation: -5 },
        { y: 0, rotation: 0, duration: 0.8, ease: "bounce.out" }, 0
      );

      // 0.4s: IMPACT DUST & SCREEN SHAKE
      masterTimeline.call(() => {
        window.burstDust(400, 500, 40, 0xAAAAAA); // Grey dust at bottom
      }, null, 0.4);
      masterTimeline.to("#root", { x: "-=3", duration: 0.05, yoyo: true, repeat: 3 }, 0.4);

      // 0.6s: LATCHES DISENGAGE (Snap open)
      masterTimeline.to(".latch.left", { rotation: -45, scale: 0.8, duration: 0.2, ease: "back.in(2)" }, 0.6);
      masterTimeline.to(".latch.right", { rotation: 45, scale: 0.8, duration: 0.2, ease: "back.in(2)" }, 0.65);

      // 0.8s: INTERIOR GLOW & LID OPENS (3D Hinge)
      masterTimeline.to(".crate-interior", { opacity: 1, duration: 0.3 }, 0.8);
      masterTimeline.to(".crate-lid", { 
        rotateX: 110, 
        duration: 0.6, 
        ease: "power2.inOut" 
      }, 0.9);

      // 1.0s: LOOT REVEAL (Staggered upward float)
      masterTimeline.to(".loot-rarity", { opacity: 1, y: 0, duration: 0.5 }, 1.1);
      masterTimeline.to(".loot-name", { opacity: 1, y: 0, duration: 0.5 }, 1.2);
      masterTimeline.to(".loot-amount", { opacity: 1, y: 0, duration: 0.5 }, 1.3);
      
      // Amount Count-Up
      const startTime = performance.now();
      countInterval = setInterval(() => {
        const elapsed = performance.now() - startTime;
        const progress = Math.min(elapsed / 1000, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(ease * targetAmount);
        const el = document.getElementById('lootAmount');
        if (el) el.textContent = `${symbol}${current.toLocaleString('en-IN')}`;
        if (progress >= 1) {
          clearInterval(countInterval);
          if (el) el.textContent = `${symbol}${targetAmount.toLocaleString('en-IN')}`;
          // Trigger loot spark burst when amount finishes
          window.burstLoot(400, 320, 30, 0x00FFFF); 
        }
      }, 16);

      if (donation.message) {
        masterTimeline.to(".loot-message", { opacity: 1, y: 0, duration: 0.5 }, 1.4);
      }

      // 1.6s: MEDIA HOLOGRAM PROJECTION
      if (document.querySelector('.media-hologram')) {
        masterTimeline.to(".media-hologram", { 
          opacity: 1, 
          y: 0, // Slides up from -120px bottom offset conceptually, but we animate translateY
          duration: 0.7, 
          ease: "power2.out" 
        }, 1.6);
      }

      // 2.0s: AMBIENT LOOT SPARKS
      masterTimeline.call(() => {
        setInterval(() => {
          if (document.querySelector('.crate-stage')) {
            window.burstLoot(350 + Math.random() * 100, 350, 2, Math.random() > 0.5 ? 0x00FFFF : 0x8A2BE2);
          }
        }, 300);
      }, null, 2.0);
    }

    function hideAlert() {
      const stage = document.querySelector('.crate-stage');
      if (!stage) return;
      if (masterTimeline) masterTimeline.kill();
      clearInterval(countInterval);

      const exitTl = gsap.timeline({
        onComplete: () => {
          const dustCanvas = document.getElementById('dust-canvas');
          const pixiCanvas = document.getElementById('particle-canvas');
          document.getElementById('root').innerHTML = '';
          document.getElementById('root').appendChild(dustCanvas);
          document.getElementById('root').appendChild(pixiCanvas);
        }
      });

      // Cinematic Exit: Lid slams shut, crate dissolves into particles
      exitTl
        .to(".crate-lid", { rotateX: 0, duration: 0.3, ease: "power2.in" }, 0)
        .to(".latch.left", { rotation: 0, scale: 1, duration: 0.2 }, 0.2)
        .to(".latch.right", { rotation: 0, scale: 1, duration: 0.2 }, 0.2)
        .to(".crate-interior, .media-hologram", { opacity: 0, duration: 0.2 }, 0.1)
        .call(() => { window.burstDust(400, 400, 50, 0x8A2BE2); }, null, 0.3) // Purple dissolution burst
        .to(".crate-stage", { scale: 1.1, opacity: 0, filter: "blur(10px)", duration: 0.5 }, 0.3);
    }

    function triggerAlert(index) {
      currentDonation = mockDonations[index];
      hideAlert();
      setTimeout(() => showAlert(currentDonation), 800);
    }

    // ============================================================
    // INIT
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
      initPixi();
      if (new URLSearchParams(window.location.search).get('demo') === '1') {
        document.getElementById('demoControls').classList.add('visible');
      }
      setTimeout(() => showAlert(currentDonation), 500);
    });
  </script>
</body>
</html>
