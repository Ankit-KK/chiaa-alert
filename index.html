<!doctype html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latifa Command Center Alert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       GLOBAL — Transparent for OBS
       ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
      font-family: 'Exo 2', sans-serif;
    }
    #root {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
    }

    /* Demo Controls (visible only with ?demo=1) */
    .demo-controls {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 9999;
      background: rgba(10, 10, 15, 0.9); border: 1px solid #8A2BE2;
      padding: 14px 18px; border-radius: 4px;
      font-family: 'Rajdhani', sans-serif; font-size: 14px; color: #fff;
    }
    .demo-controls.visible { display: block; }
    .demo-controls h3 { font-family: 'Orbitron', sans-serif; font-size: 14px; margin-bottom: 10px; color: #00FFFF; text-transform: uppercase; letter-spacing: 1px; }
    .demo-controls button {
      background: linear-gradient(90deg, #8A2BE2, #FF007F);
      color: white; border: none; padding: 6px 12px; margin: 3px 4px 3px 0;
      border-radius: 2px; font-family: 'Rajdhani', sans-serif; font-weight: 700;
      cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    }
    .demo-controls button:hover { filter: brightness(1.2); }

    /* ============================================================
       TOKENS
       ============================================================ */
    .latifa-alert {
      --c-purple: #8A2BE2;
      --c-pink: #FF007F;
      --c-cyan: #00FFFF;
      --c-dark: #0A0A0F;
      --c-graphite: #1A1A24;
      --c-glass: rgba(20, 20, 30, 0.65);
      --c-glass-border: rgba(138, 43, 226, 0.4);
      --c-text: #FFFFFF;
      --c-text-dim: #A0A0B0;

      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      width: 560px;
    }

    /* ============================================================
       SCANLINE OVERLAY
       ============================================================ */
    .scanline-overlay {
      position: absolute; inset: -50px; z-index: 50; pointer-events: none;
      background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 255, 0.03) 51%, transparent 52%);
      background-size: 100% 4px;
      opacity: 0;
    }
    .latifa-alert.entering .scanline-overlay { animation: scanlineSweep 1.5s ease-out 0.2s forwards; }
    .latifa-alert.idle .scanline-overlay { animation: scanlineIdle 6s linear infinite; }
    .latifa-alert.exiting .scanline-overlay { animation: scanlineSweep 0.8s ease-in forwards; }

    @keyframes scanlineSweep {
      0% { transform: translateY(-100%); opacity: 1; }
      100% { transform: translateY(100%); opacity: 0; }
    }
    @keyframes scanlineIdle {
      0% { transform: translateY(-100%); opacity: 0.5; }
      100% { transform: translateY(100%); opacity: 0.5; }
    }

    /* ============================================================
       COMMAND PANEL
       ============================================================ */
    .command-panel {
      position: relative;
      width: 560px;
      height: 160px;
      background: linear-gradient(135deg, var(--c-glass) 0%, rgba(10, 10, 15, 0.85) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      /* Tactical angled cut on bottom right */
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 24px), calc(100% - 24px) 100%, 0 100%);
      border: 1px solid var(--c-glass-border);
      box-shadow: 0 0 20px rgba(138, 43, 226, 0.15), inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex;
      padding: 20px 24px 20px 120px; /* Left padding for hex avatar */
      gap: 16px;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      z-index: 10;
    }
    .latifa-alert.entering .command-panel { animation: panelAssemble 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards; }
    .latifa-alert.exiting .command-panel { animation: panelDissolve 0.6s ease-in forwards; }

    @keyframes panelAssemble {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes panelDissolve {
      0% { opacity: 1; transform: scale(1); filter: blur(0); }
      100% { opacity: 0; transform: scale(1.05); filter: blur(8px); }
    }

    /* Illuminated border segments */
    .command-panel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--c-cyan), var(--c-purple), var(--c-pink));
      opacity: 0; transform: scaleX(0); transform-origin: left;
    }
    .latifa-alert.entering .command-panel::before { animation: borderDraw 0.6s ease-out 0.8s forwards; }
    @keyframes borderDraw { to { opacity: 1; transform: scaleX(1); } }

    /* ============================================================
       HEXAGONAL AVATAR
       ============================================================ */
    .hex-avatar-wrapper {
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 76px;
      height: 84px;
      z-index: 12;
      opacity: 0;
    }
    .latifa-alert.entering .hex-avatar-wrapper { animation: avatarLock 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards; }
    @keyframes avatarLock {
      0% { opacity: 0; transform: translateY(-50%) scale(0.5) rotate(-30deg); }
      100% { opacity: 1; transform: translateY(-50%) scale(1) rotate(0deg); }
    }

    .hex-ring {
      position: absolute; inset: -4px;
      background: conic-gradient(from 0deg, transparent 0%, var(--c-cyan) 25%, var(--c-pink) 50%, transparent 75%);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      animation: rotateRing 6s linear infinite;
      filter: blur(2px);
    }
    .latifa-alert.idle .hex-ring { animation: rotateRing 6s linear infinite, breatheGlow 3s ease-in-out infinite; }
    @keyframes rotateRing { to { transform: rotate(360deg); } }
    @keyframes breatheGlow { 0%, 100% { filter: blur(2px) brightness(1); } 50% { filter: blur(4px) brightness(1.3); } }

    .hex-inner {
      position: absolute; inset: 2px;
      background: var(--c-dark);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .hex-inner img {
      width: 110%; height: 110%; object-fit: cover;
      /* Counter-rotate slightly if needed, but cover handles it */
    }

    /* ============================================================
       INFO BLOCK
       ============================================================ */
    .info-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      min-width: 0;
    }

    /* Donor Name */
    .donor-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--c-text);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      flex-wrap: wrap;
    }
    .donor-name .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(8px);
      animation: charReveal 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .donor-name .char:last-child {
      color: var(--c-cyan);
      text-shadow: 0 0 8px var(--c-cyan);
      animation: charReveal 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards, cyanPulse 0.5s ease-out 0.3s;
    }
    @keyframes charReveal { to { opacity: 1; transform: translateY(0); } }
    @keyframes cyanPulse { 0% { text-shadow: 0 0 20px var(--c-cyan); } 100% { text-shadow: 0 0 8px var(--c-cyan); } }

    /* Amount Block */
    .amount-block {
      position: relative;
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
    }
    .donation-amount {
      font-family: 'Rajdhani', sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: var(--c-text);
      line-height: 1;
      letter-spacing: 1px;
    }
    .amount-bloom {
      position: absolute;
      inset: -10px -20px;
      background: radial-gradient(ellipse at center, rgba(138, 43, 226, 0.6) 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.5);
      z-index: -1;
      filter: blur(8px);
    }
    .latifa-alert.entering .amount-bloom { animation: bloomPulse 0.8s ease-out 1.8s forwards; }
    @keyframes bloomPulse {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0.6; transform: scale(1); }
    }

    /* Tactical Type Module */
    .type-module {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--c-cyan);
      background: rgba(0, 255, 255, 0.08);
      border: 1px solid rgba(0, 255, 255, 0.3);
      padding: 3px 10px;
      letter-spacing: 2px;
      clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 100%, 0 100%);
      opacity: 0;
      transform: translateX(-10px);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
    }
    .latifa-alert.entering .type-module { animation: modulePowerOn 0.5s ease-out 1.4s forwards; }
    @keyframes modulePowerOn {
      0% { opacity: 0; transform: translateX(-10px); filter: brightness(2); }
      100% { opacity: 1; transform: translateX(0); filter: brightness(1); }
    }

    /* Message Glass Panel */
    .message-glass {
      margin-top: 4px;
      font-family: 'Exo 2', sans-serif;
      font-size: 15px;
      color: var(--c-text-dim);
      background: rgba(255, 255, 255, 0.03);
      border-left: 2px solid var(--c-pink);
      padding: 6px 12px;
      backdrop-filter: blur(4px);
      opacity: 0;
      transform: translateY(10px);
      max-width: 100%;
      word-wrap: break-word;
    }
    .latifa-alert.entering .message-glass { animation: glassSlideUp 0.6s ease-out 1.6s forwards; }
    @keyframes glassSlideUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       MEDIA SECTION
       ============================================================ */
    .media-section {
      position: relative;
      width: 480px;
      margin-top: -10px; /* Slight overlap with command panel */
      z-index: 5;
      opacity: 0;
      transform: translateY(40px);
    }
    .latifa-alert.entering .media-section { animation: mediaRise 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.0s forwards; }
    .latifa-alert.exiting .media-section { animation: mediaDrop 0.5s ease-in 0.2s forwards; }

    @keyframes mediaRise {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes mediaDrop {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(40px); }
    }

    .media-frame-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 6;
    }
    .media-border-path {
      fill: none;
      stroke: var(--c-purple);
      stroke-width: 2;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      filter: drop-shadow(0 0 4px var(--c-purple));
    }
    .latifa-alert.entering .media-border-path { animation: drawMediaBorder 1s ease-out 1.2s forwards; }
    @keyframes drawMediaBorder { to { stroke-dashoffset: 0; } }

    .media-corner {
      position: absolute;
      width: 16px; height: 16px;
      border: 2px solid var(--c-cyan);
      opacity: 0;
      z-index: 7;
    }
    .mc-tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
    .mc-tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
    .mc-bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
    .mc-br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }
    
    .latifa-alert.entering .media-corner { animation: cornerLock 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 1.8s forwards; }
    @keyframes cornerLock {
      0% { opacity: 0; transform: scale(1.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    .media-content {
      width: 100%;
      height: 240px;
      background: var(--c-dark);
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(138, 43, 226, 0.2);
    }
    .media-content img, .media-content video {
      width: 100%; height: 100%; object-fit: contain; display: block;
    }

    /* ============================================================
       PARTICLES
       ============================================================ */
    .particles-container {
      position: absolute;
      inset: -40px;
      pointer-events: none;
      z-index: 20;
      overflow: visible;
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: var(--c-cyan);
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 6px var(--c-cyan);
    }
    .latifa-alert.idle .particle { animation: particleFloat 4s linear infinite; }
    
    .particle:nth-child(1) { left: 10%; bottom: 0; animation-delay: 0.0s; }
    .particle:nth-child(2) { left: 30%; bottom: 0; animation-delay: 1.2s; width: 2px; height: 2px; background: var(--c-pink); box-shadow: 0 0 6px var(--c-pink); }
    .particle:nth-child(3) { left: 50%; bottom: 0; animation-delay: 0.5s; }
    .particle:nth-child(4) { left: 70%; bottom: 0; animation-delay: 2.0s; width: 4px; height: 4px; }
    .particle:nth-child(5) { left: 90%; bottom: 0; animation-delay: 1.5s; background: var(--c-purple); box-shadow: 0 0 6px var(--c-purple); }
    .particle:nth-child(6) { left: 20%; bottom: 0; animation-delay: 2.8s; }
    .particle:nth-child(7) { left: 60%; bottom: 0; animation-delay: 3.2s; width: 2px; height: 2px; }
    .particle:nth-child(8) { left: 80%; bottom: 0; animation-delay: 0.8s; }

    @keyframes particleFloat {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-300px) scale(0); opacity: 0; }
    }

    /* ============================================================
       EXIT SCANLINE
       ============================================================ */
    .exit-scan {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent, var(--c-purple), transparent);
      opacity: 0;
      z-index: 100;
      pointer-events: none;
    }
    .latifa-alert.exiting .exit-scan { animation: exitScanline 0.6s ease-in 0.4s forwards; }
    @keyframes exitScanline {
      0% { transform: translateY(100%); opacity: 0.8; }
      100% { transform: translateY(-100%); opacity: 0; }
    }
  a
  </style>
</head>
<body>
  <div id="root"></div>

  <div class="demo-controls" id="demoControls">
    <h3>Latifa Command Center</h3>
    <button onclick="triggerAlert(0)">Test: MEDIA</button>
    <button onclick="triggerAlert(1)">Test: TEXT</button>
    <button onclick="triggerAlert(2)">Test: VOICE</button>
    <button onclick="triggerAlert(3)">Test: HYPERSOUND</button>
  </div>

  <script>
    // ============================================================
    // DATA & HELPERS
    // ============================================================
    const CURRENCY_SYMBOLS = { INR: '₹', USD: '$', EUR: '€', GBP: '£' };
    const fmt = (d) => `${CURRENCY_SYMBOLS[d.currency || 'INR'] || '₹'}${d.amount.toLocaleString('en-IN')}`;
    
    const kindLabel = (d) => {
      if (d.voice_message_url) return 'VOICE';
      if (d.hypersound_url || d.is_hyperemote) return 'HYPERSOUND';
      if (d.media_url) return 'MEDIA';
      return 'TEXT';
    };

    const mockDonations = [
      { name: 'SniperKing', amount: 1500, currency: 'INR', message: 'Chicken Dinner incoming! 🍗', media_url: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600', media_type: 'image' },
      { name: 'LatifaFan_99', amount: 500, currency: 'INR', message: 'Love the streams!', media_url: null },
      { name: 'BGMI_Pro', amount: 2000, currency: 'INR', message: 'Voice message test', voice_message_url: 'x' },
      { name: 'AirdropHunter', amount: 5000, currency: 'INR', message: 'Hypersound activated!', hypersound_url: 'x', is_hyperemote: true }
    ];

    let currentDonation = mockDonations[0];
    let phaseTimer = null;
    let hideTimer = null;
    let countInterval = null;

    // ============================================================
    // RENDER
    // ============================================================
    function render(donation, phase) {
      const badge = kindLabel(donation);
      const mediaUrl = donation.media_url || null;
      const isVideo = (donation.media_type || '').toLowerCase().includes('video');
      const showMedia = Boolean(mediaUrl);
      const targetAmountStr = fmt(donation);
      
      // Split name into characters for sequential animation
      const nameStr = (donation.name || 'Anonymous').trim().toUpperCase();
      const nameChars = nameStr.split('').map((char, i) => 
        `<span class="char" style="animation-delay: ${1.0 + (i * 0.04)}s">${char === ' ' ? '&nbsp;' : char}</span>`
      ).join('');

      const mediaHtml = showMedia ? `
        <div class="media-section">
          <svg class="media-frame-svg" viewBox="0 0 480 240" preserveAspectRatio="none">
            <path class="media-border-path" d="M 2 2 L 478 2 L 478 224 L 462 238 L 2 238 Z" />
          </svg>
          <div class="media-corner mc-tl"></div>
          <div class="media-corner mc-tr"></div>
          <div class="media-corner mc-bl"></div>
          <div class="media-corner mc-br"></div>
          <div class="media-content">
            ${isVideo 
              ? `<video src="${mediaUrl}" autoplay loop muted playsinline></video>` 
              : `<img src="${mediaUrl}" alt="donation media" />`}
          </div>
        </div>
      ` : '';

      return `
        <div class="latifa-alert ${phase}">
          <div class="scanline-overlay"></div>
          <div class="exit-scan"></div>
          
          <div class="command-panel">
            <div class="hex-avatar-wrapper">
              <div class="hex-ring"></div>
              <div class="hex-inner">
                <img src="/latifa_logo.png" alt="Latifa" onerror="this.style.display='none'" />
              </div>
            </div>
            
            <div class="info-block">
              <div class="donor-name">${nameChars}</div>
              <div class="amount-block">
                <div class="donation-amount" id="amountDisplay">₹0</div>
                <div class="amount-bloom"></div>
                <div class="type-module">${badge}</div>
              </div>
              ${donation.message ? `<div class="message-glass">"${donation.message}"</div>` : ''}
            </div>
          </div>

          ${mediaHtml}

          <div class="particles-container">
            ${Array.from({length: 8}).map(() => '<div class="particle"></div>').join('')}
          </div>
        </div>
      `;
    }

    // ============================================================
    // ANIMATION LOGIC
    // ============================================================
    function showAlert(donation) {
      clearTimeout(phaseTimer);
      clearTimeout(hideTimer);
      clearInterval(countInterval);
      
      const root = document.getElementById('root');
      root.innerHTML = render(donation, 'entering');
      
      // Count up animation for amount
      const targetAmount = donation.amount;
      const symbol = CURRENCY_SYMBOLS[donation.currency || 'INR'] || '₹';
      const duration = 1200; // 1.2 seconds
      const startTime = performance.now();
      const amountEl = document.getElementById('amountDisplay');
      
      countInterval = setInterval(() => {
        const elapsed = performance.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // Ease out cubic
        const ease = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(ease * targetAmount);
        
        if (amountEl) {
          amountEl.textContent = `${symbol}${current.toLocaleString('en-IN')}`;
        }
        
        if (progress >= 1) {
          clearInterval(countInterval);
          if (amountEl) amountEl.textContent = fmt(donation);
        }
      }, 16);

      // Transition to idle
      phaseTimer = setTimeout(() => {
        const el = root.querySelector('.latifa-alert');
        if (el) {
          el.classList.remove('entering');
          el.classList.add('idle');
        }
      }, 3500);
    }

    function hideAlert() {
      const root = document.getElementById('root');
      const el = root.querySelector('.latifa-alert');
      if (!el) return;
      
      clearInterval(countInterval);
      el.classList.remove('idle', 'entering');
      el.classList.add('exiting');
      
      hideTimer = setTimeout(() => {
        root.innerHTML = '';
      }, 1200);
    }

    function triggerAlert(index) {
      currentDonation = mockDonations[index];
      hideAlert();
      setTimeout(() => showAlert(currentDonation), 1300);
    }

    // ============================================================
    // INIT
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
      if (new URLSearchParams(window.location.search).get('demo') === '1') {
        document.getElementById('demoControls').classList.add('visible');
      }
      setTimeout(() => showAlert(currentDonation), 300);
    });
  </script>
</body>
</html>
