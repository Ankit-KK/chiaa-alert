<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latifa Compact Premium Alert</title>
  
  <!-- Clean, Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- GSAP for flawless micro-animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    /* ============================================================
       GLOBAL & RESET
       ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #root {
      width: 100%; height: 100%;
      display: flex;
      align-items: flex-end; /* Default OBS placement: bottom left/center */
      justify-content: flex-start;
      padding: 40px;
      background: transparent;
    }

    .demo-controls {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 9999;
      background: rgba(20, 20, 25, 0.9); border: 1px solid rgba(255,255,255,0.1);
      padding: 12px; border-radius: 8px; backdrop-filter: blur(10px);
    }
    .demo-controls.visible { display: flex; gap: 8px; }
    .demo-controls button {
      background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .demo-controls button:hover { background: rgba(255,255,255,0.2); }

    /* ============================================================
       ALERT CONTAINER (Compact Footprint)
       ============================================================ */
    .alert-wrapper {
      position: relative;
      width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0; /* Hidden until GSAP starts */
    }

    /* ============================================================
       MAIN NOTIFICATION CARD
       ============================================================ */
    .alert-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(15, 15, 20, 0.75);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    /* Subtle premium accent: Left glow line */
    .alert-card::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 3px;
      background: linear-gradient(180deg, #F700FF, #00F0FF);
      border-radius: 0 4px 4px 0;
      box-shadow: 0 0 12px rgba(247, 0, 255, 0.5);
    }

    /* Subtle light sweep on idle */
    .alert-sweep {
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.05) 45%, rgba(255,255,255,0.02) 50%, transparent 55%);
      transform: translateX(-100%);
      pointer-events: none;
    }

    /* ============================================================
       AVATAR
       ============================================================ */
    .alert-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a2a35, #1a1a24);
      border: 2px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .alert-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }
    /* Fallback initial if no image */
    .alert-avatar-initial {
      font-size: 18px; font-weight: 700; color: #fff;
    }

    /* ============================================================
       CONTENT
       ============================================================ */
    .alert-content {
      flex: 1;
      min-width: 0; /* Allows text truncation */
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .alert-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .alert-name {
      font-size: 16px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .alert-badge {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .alert-amount {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(90deg, #F700FF, #00F0FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .alert-message {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.4;
      margin-top: 2px;
      /* Truncate after 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ============================================================
       MEDIA SECTION (Compact, Below Card)
       ============================================================ */
    .alert-media {
      width: 100%;
      height: 0; /* Starts collapsed */
      border-radius: 12px;
      overflow: hidden;
      background: rgba(15, 15, 20, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      opacity: 0;
      position: relative;
    }
    
    .alert-media-inner {
      width: 100%;
      height: 160px; /* Fixed compact height for media */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .alert-media-inner img, 
    .alert-media-inner video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }

    /* ============================================================
       UTILITY CLASSES FOR GSAP
       ============================================================ */
    .reveal-up {
      opacity: 0;
      transform: translateY(8px);
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="alert-wrapper" id="alertWrapper">
      <!-- Dynamically populated -->
    </div>
  </div>

  <div class="demo-controls" id="demoControls">
    <button onclick="triggerAlert(0)">Test: Media</button>
    <button onclick="triggerAlert(1)">Test: Text</button>
    <button onclick="triggerAlert(2)">Test: Voice</button>
  </div>

  <script>
    // ============================================================
    // DATA
    // ============================================================
    const mockDonations = [
      { 
        name: 'SniperKing', 
        amount: 1500, 
        currency: 'INR', 
        message: 'Absolutely love the energy today! Keep dominating.', 
        media_url: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400',
        type: 'MEDIA'
      },
      { 
        name: 'LatifaFan_99', 
        amount: 500, 
        currency: 'INR', 
        message: 'Best streamer on the platform, hands down. Chicken dinner!', 
        media_url: null,
        type: 'TEXT'
      },
      { 
        name: 'BGMI_Pro', 
        amount: 2000, 
        currency: 'INR', 
        message: 'Voice message test', 
        media_url: null,
        type: 'VOICE'
      }
    ];
    
    let currentDonation = mockDonations[0];
    let masterTimeline = null;
    let countInterval = null;

    // ============================================================
    // RENDER
    // ============================================================
    function render(donation) {
      const symbol = { INR: '₹', USD: '$', EUR: '€', GBP: '£' }[donation.currency || 'INR'] || '₹';
      const initial = donation.name.charAt(0).toUpperCase();
      
      const mediaHtml = donation.media_url ? `
        <div class="alert-media">
          <div class="alert-media-inner">
            <img src="${donation.media_url}" alt="donation media" />
          </div>
        </div>
      ` : '';

      return `
        <div class="alert-card">
          <div class="alert-sweep"></div>
          <div class="alert-avatar">
            <img src="/latifa_logo.png" alt="L" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
            <div class="alert-avatar-initial" style="display:none;">${initial}</div>
          </div>
          <div class="alert-content">
            <div class="alert-header">
              <span class="alert-name reveal-up">${donation.name}</span>
              <span class="alert-badge reveal-up">${donation.type}</span>
            </div>
            <div class="alert-amount reveal-up" id="amountDisplay">${symbol}0</div>
            ${donation.message ? `<div class="alert-message reveal-up">"${donation.message}"</div>` : ''}
          </div>
        </div>
        ${mediaHtml}
      `;
    }

    // ============================================================
    // GSAP MICRO-CINEMATIC (Fast, Elegant, Compact)
    // ============================================================
    function showAlert(donation) {
      if (masterTimeline) masterTimeline.kill();
      clearInterval(countInterval);
      
      const wrapper = document.getElementById('alertWrapper');
      wrapper.innerHTML = render(donation);

      masterTimeline = gsap.timeline({ defaults: { ease: "power3.out" } });
      const targetAmount = donation.amount;
      const symbol = { INR: '₹', USD: '$', EUR: '€', GBP: '£' }[donation.currency || 'INR'] || '₹';

      // 0.00s: Wrapper appears
      gsap.set(wrapper, { opacity: 1 });

      // 0.00s: Card slides up + unblurs (Apple-style notification entrance)
      masterTimeline.fromTo(".alert-card", 
        { y: 20, opacity: 0, scale: 0.96, filter: "blur(8px)" },
        { y: 0, opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.6, ease: "expo.out" }
      );

      // 0.10s: Avatar pops in with slight elastic bounce
      masterTimeline.fromTo(".alert-avatar", 
        { scale: 0.5, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.4)" }, "-=0.4"
      );

      // 0.15s: Text elements stagger up (fast, readable)
      masterTimeline.to(".reveal-up", { 
        y: 0, 
        opacity: 1, 
        duration: 0.4, 
        stagger: 0.04 
      }, "-=0.35");

      // 0.20s: Light sweep across the glass for premium feel
      masterTimeline.to(".alert-sweep", { 
        x: "100%", 
        duration: 0.8, 
        ease: "power1.inOut" 
      }, "-=0.2");

      // 0.30s: Amount Count-Up (runs concurrently)
      const startTime = performance.now();
      countInterval = setInterval(() => {
        const elapsed = performance.now() - startTime;
        const progress = Math.min(elapsed / 800, 1); // Fast 0.8s count
        const ease = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(ease * targetAmount);
        const el = document.getElementById('amountDisplay');
        if (el) el.textContent = `${symbol}${current.toLocaleString('en-IN')}`;
        
        if (progress >= 1) {
          clearInterval(countInterval);
          if (el) el.textContent = `${symbol}${targetAmount.toLocaleString('en-IN')}`;
        }
      }, 16);

      // 0.40s: Media expands below (if exists)
      if (document.querySelector('.alert-media')) {
        masterTimeline.to(".alert-media", { 
          height: "160px", 
          opacity: 1, 
          duration: 0.5, 
          ease: "power3.out" 
        }, "-=0.2");
      }

      // 1.50s: Subtle idle shimmer (optional, keeps it alive without distraction)
      masterTimeline.to(".alert-card", { 
        boxShadow: "0 8px 32px rgba(0, 0, 0, 0.4), 0 0 20px rgba(247, 0, 255, 0.05)", 
        duration: 2, 
        yoyo: true, 
        repeat: -1, 
        ease: "sine.inOut" 
      }, 1.5);
    }

    function hideAlert() {
      const wrapper = document.getElementById('alertWrapper');
      if (!wrapper.innerHTML) return;
      
      if (masterTimeline) masterTimeline.kill();
      clearInterval(countInterval);

      const exitTl = gsap.timeline({
        onComplete: () => {
          wrapper.innerHTML = '';
          gsap.set(wrapper, { opacity: 0 });
        }
      });

      // Fast, clean exit
      exitTl
        .to(".alert-media", { height: 0, opacity: 0, duration: 0.3 }, 0)
        .to(".alert-card", { 
          y: 10, 
          opacity: 0, 
          scale: 0.96, 
          filter: "blur(6px)", 
          duration: 0.4, 
          ease: "power2.in" 
        }, 0.1);
    }

    function triggerAlert(index) {
      currentDonation = mockDonations[index];
      hideAlert();
      setTimeout(() => showAlert(currentDonation), 600);
    }

    // ============================================================
    // INIT
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
      if (new URLSearchParams(window.location.search).get('demo') === '1') {
        document.getElementById('demoControls').classList.add('visible');
      }
      // Auto-trigger first alert after a brief delay
      setTimeout(() => showAlert(currentDonation), 500);
    });
  </script>
</body>
</html>
