<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latifa Alert Preview</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap">
  <style>
    /* Transparency checker - remove for OBS */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      background-image:
        linear-gradient(45deg, #1a1a2e 25%, transparent 25%),
        linear-gradient(-45deg, #1a1a2e 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a1a2e 75%),
        linear-gradient(-45deg, transparent 75%, #1a1a2e 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      background-color: #12121f;
      font-family: 'Inter', sans-serif;
    }

    /* ═══════════════════════════════════════════
       ALERT STYLES - Everything below this line
       is the actual alert component
    ═══════════════════════════════════════════ */

    .latifa-alert {
      --la-twilight-deep: #1a1f3a;
      --la-twilight: #2d1b4e;
      --la-purple: #4a3a6e;
      --la-purple-mid: #6b5a8e;
      --la-lavender: #b8a9c9;
      --la-lilac: #d4b8e0;
      --la-pink: #e8b4c8;
      --la-peach: #f5d4c4;
      --la-gold: #d4a574;
      --la-gold-light: #f0d9b5;
      --la-cream: #f5f0f8;
      --la-white: #ffffff;

      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .latifa-alert *, .latifa-alert *::before, .latifa-alert *::after {
      box-sizing: border-box;
      user-select: none;
    }

    /* WRAP */
    .latifa-alert .la-wrap {
      position: relative;
      display: inline-block;
      opacity: 0;
      transform: translateY(16px) scale(0.92);
    }

    .latifa-alert .la-wrap.entering {
      animation: la-wrapEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes la-wrapEnter {
      0% { opacity: 0; transform: translateY(16px) scale(0.92); filter: blur(4px); }
      60% { filter: blur(0); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* MAIN OBJECT - Crystal/Gem silhouette */
    .latifa-alert .la-object {
      position: relative;
      width: 400px;
      padding: 24px 36px 20px;
      background: linear-gradient(
        160deg,
        rgba(74, 58, 110, 0.94) 0%,
        rgba(45, 27, 78, 0.96) 40%,
        rgba(26, 31, 58, 0.97) 100%
      );
      clip-path: polygon(
        20px 0%,
        calc(100% - 20px) 0%,
        100% 16px,
        100% calc(100% - 8px),
        calc(100% - 12px) 100%,
        12px 100%,
        0% calc(100% - 8px),
        0% 16px
      );
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(184, 169, 201, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        inset 0 -1px 0 rgba(0, 0, 0, 0.2);
    }

    /* Inner shimmer */
    .latifa-alert .la-object::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(212, 184, 224, 0.06) 0%,
        transparent 40%,
        rgba(232, 180, 200, 0.03) 100%
      );
      pointer-events: none;
    }

    /* Top edge highlight */
    .latifa-alert .la-object::after {
      content: '';
      position: absolute;
      top: 0;
      left: 20px;
      right: 20px;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(184, 169, 201, 0.4) 30%,
        rgba(212, 184, 224, 0.6) 50%,
        rgba(184, 169, 201, 0.4) 70%,
        transparent 100%
      );
      pointer-events: none;
    }

    /* Ambient glow behind */
    .latifa-alert .la-glow {
      position: absolute;
      top: -30%;
      left: -20%;
      width: 140%;
      height: 160%;
      background: radial-gradient(
        ellipse at 50% 40%,
        rgba(184, 169, 201, 0.1) 0%,
        rgba(107, 90, 142, 0.05) 40%,
        transparent 70%
      );
      pointer-events: none;
      opacity: 0;
    }

    .latifa-alert .entering .la-glow {
      animation: la-glowPulse 1.5s ease-out 0.2s forwards;
    }

    @keyframes la-glowPulse {
      0% { opacity: 0; transform: scale(0.9); }
      50% { opacity: 1; }
      100% { opacity: 0.7; transform: scale(1); }
    }

    /* SVG Border */
    .latifa-alert .la-border-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
      overflow: visible;
    }

    .latifa-alert .la-border-path {
      stroke-dasharray: 1100;
      stroke-dashoffset: 1100;
    }

    .latifa-alert .entering .la-border-path {
      animation: la-borderDraw 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.15s forwards;
    }

    @keyframes la-borderDraw {
      to { stroke-dashoffset: 0; }
    }

    /* Corner accents */
    .latifa-alert .la-corner {
      position: absolute;
      width: 12px;
      height: 12px;
      opacity: 0;
      z-index: 4;
    }

    .latifa-alert .la-corner-tl { top: 10px; left: 14px; border-top: 1.5px solid var(--la-lavender); border-left: 1.5px solid var(--la-lavender); }
    .latifa-alert .la-corner-tr { top: 10px; right: 14px; border-top: 1.5px solid var(--la-lilac); border-right: 1.5px solid var(--la-lilac); }
    .latifa-alert .la-corner-bl { bottom: 6px; left: 8px; border-bottom: 1.5px solid var(--la-pink); border-left: 1.5px solid var(--la-pink); }
    .latifa-alert .la-corner-br { bottom: 6px; right: 8px; border-bottom: 1.5px solid var(--la-peach); border-right: 1.5px solid var(--la-peach); }

    .latifa-alert .entering .la-corner {
      animation: la-cornerIn 0.3s ease-out 0.5s forwards;
    }

    @keyframes la-cornerIn {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 0.8; transform: scale(1); }
    }

    /* Floating particles */
    .latifa-alert .la-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 2;
    }

    .latifa-alert .la-particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      opacity: 0;
    }

    .latifa-alert .la-particle:nth-child(odd) {
      background: var(--la-lavender);
      box-shadow: 0 0 4px var(--la-lavender);
    }

    .latifa-alert .la-particle:nth-child(even) {
      background: var(--la-pink);
      box-shadow: 0 0 4px var(--la-pink);
    }

    .latifa-alert .entering .la-particle {
      animation: la-pFloat 5s infinite ease-in-out;
    }

    .latifa-alert .la-particle:nth-child(1) { top: 18%; left: 8%; animation-delay: 0.4s; width: 3px; height: 3px; }
    .latifa-alert .la-particle:nth-child(2) { top: 65%; left: 90%; animation-delay: 0.7s; }
    .latifa-alert .la-particle:nth-child(3) { top: 35%; left: 25%; animation-delay: 1.0s; width: 2.5px; height: 2.5px; }
    .latifa-alert .la-particle:nth-child(4) { top: 78%; left: 55%; animation-delay: 0.8s; }
    .latifa-alert .la-particle:nth-child(5) { top: 12%; left: 70%; animation-delay: 1.2s; width: 2px; height: 2px; }
    .latifa-alert .la-particle:nth-child(6) { top: 50%; left: 42%; animation-delay: 0.6s; }

    @keyframes la-pFloat {
      0% { opacity: 0; transform: translateY(0) scale(0.4); }
      15% { opacity: 0.9; transform: translateY(-6px) scale(1); }
      70% { opacity: 0.3; transform: translateY(4px) scale(0.7); }
      100% { opacity: 0; transform: translateY(10px) scale(0.3); }
    }

    /* CONTENT */
    .latifa-alert .la-content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Name */
    .latifa-alert .la-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--la-white);
      letter-spacing: 0.3px;
      line-height: 1.2;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: translateY(6px);
    }

    .latifa-alert .entering .la-name {
      animation: la-textRise 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    }

    /* Amount row */
    .latifa-alert .la-amount-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 2px;
    }

    .latifa-alert .la-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--la-lavender) 0%, var(--la-lilac) 40%, var(--la-pink) 80%, var(--la-peach) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.8px;
      opacity: 0;
      transform: translateY(6px);
    }

    .latifa-alert .entering .la-amount {
      animation: la-textRise 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.42s forwards;
    }

    /* Badge */
    .latifa-alert .la-badge {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--la-lavender);
      padding: 2px 8px;
      border: 1px solid rgba(184, 169, 201, 0.3);
      border-radius: 2px;
      background: rgba(184, 169, 201, 0.06);
      opacity: 0;
      transform: translateY(6px);
    }

    .latifa-alert .entering .la-badge {
      animation: la-textRise 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.48s forwards;
    }

    /* Message */
    .latifa-alert .la-message {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 400;
      color: rgba(245, 240, 248, 0.8);
      line-height: 1.5;
      margin-top: 4px;
      opacity: 0;
      transform: translateY(6px);
    }

    .latifa-alert .entering .la-message {
      animation: la-textRise 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
    }

    @keyframes la-textRise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Decorative divider */
    .latifa-alert .la-divider {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--la-lavender), var(--la-lilac), transparent);
      margin: 6px 0 2px;
      opacity: 0;
    }

    .latifa-alert .entering .la-divider {
      animation: la-dividerExpand 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
    }

    @keyframes la-dividerExpand {
      0% { width: 0; opacity: 0; }
      100% { width: 120px; opacity: 0.5; }
    }

    /* MEDIA */
    .latifa-alert .la-media {
      position: relative;
      width: 400px;
      margin-top: 8px;
      border-radius: 4px;
      overflow: hidden;
      opacity: 0;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(184, 169, 201, 0.15);
    }

    .latifa-alert .entering .la-media {
      animation: la-mediaReveal 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.7s forwards;
    }

    @keyframes la-mediaReveal {
      0% { opacity: 0; transform: translateY(8px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .latifa-alert .la-media img,
    .latifa-alert .la-media video {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ═══════════════════════════════════════════
       PREVIEW CONTROLS (not part of alert)
    ═══════════════════════════════════════════ */

    .preview-controls {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 1000;
      pointer-events: auto;
    }

    .preview-controls button {
      padding: 10px 20px;
      background: rgba(45, 27, 78, 0.9);
      border: 1px solid rgba(184, 169, 201, 0.3);
      border-radius: 6px;
      color: var(--la-cream, #f5f0f8);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }

    .preview-controls button:hover {
      background: rgba(74, 58, 110, 0.9);
      border-color: rgba(184, 169, 201, 0.6);
    }

    .preview-label {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(184, 169, 201, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }

    @media (max-width: 500px) {
      .latifa-alert .la-object {
        width: 320px;
        padding: 18px 24px 16px;
      }
      .latifa-alert .la-name { font-size: 20px; }
      .latifa-alert .la-amount { font-size: 24px; }
      .latifa-alert .la-message { font-size: 13px; }
      .latifa-alert .la-media { width: 320px; }
    }
  </style>
</head>
<body>
  <div class="preview-label">LATIFA ALERT — PREVIEW (transparent bg)</div>

  <!-- THE ALERT -->
  <div class="latifa-alert">
    <div class="la-wrap entering" id="alertWrap">
      <div class="la-object">
        <div class="la-glow"></div>

        <svg class="la-border-svg" viewBox="0 0 400 140" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="laBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#b8a9c9" />
              <stop offset="40%" stop-color="#d4b8e0" />
              <stop offset="70%" stop-color="#e8b4c8" />
              <stop offset="100%" stop-color="#f5d4c4" />
            </linearGradient>
          </defs>
          <path
            class="la-border-path"
            d="M 20 0.5 L 380 0.5 L 399.5 16 L 399.5 132 L 388 139.5 L 12 139.5 L 0.5 132 L 0.5 16 Z"
            fill="none"
            stroke="url(#laBorderGrad)"
            strokeWidth="1.2"
          />
        </svg>

        <div class="la-corner la-corner-tl"></div>
        <div class="la-corner la-corner-tr"></div>
        <div class="la-corner la-corner-bl"></div>
        <div class="la-corner la-corner-br"></div>

        <div class="la-particles">
          <div class="la-particle"></div>
          <div class="la-particle"></div>
          <div class="la-particle"></div>
          <div class="la-particle"></div>
          <div class="la-particle"></div>
          <div class="la-particle"></div>
        </div>

        <div class="la-content">
          <div class="la-name">Aria Moonwhisper</div>
          <div class="la-divider"></div>
          <div class="la-amount-row">
            <div class="la-amount">₹5,000</div>
            <div class="la-badge">TEXT</div>
          </div>
          <div class="la-message">"Thank you for the cozy vibes! Your stream always makes my day better &lt;3"</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="preview-controls">
    <button onclick="replayAlert()">↻ Replay</button>
    <button onclick="toggleMedia()">Toggle Media</button>
    <button onclick="cycleData()">Next Data</button>
  </div>

  <script>
    const donations = [
      { name: 'Aria Moonwhisper', amount: 5000, currency: 'INR', message: 'Thank you for the cozy vibes! Your stream always makes my day better <3', badge: 'TEXT' },
      { name: 'StarlightGamer', amount: 500, currency: 'INR', message: 'GG! That clutch was insane 🔥', badge: 'VOICE' },
      { name: 'Luna', amount: 100, currency: 'USD', message: '', badge: 'TEXT' },
      { name: 'TwilightFox', amount: 2500, currency: 'INR', message: 'Sending love from Japan! 🌸', badge: 'MEDIA' },
      { name: 'VelvetDreamer', amount: 10000, currency: 'INR', message: 'You deserve this! Keep being amazing', badge: 'SOUND' },
    ];

    let currentIndex = 0;
    let mediaVisible = false;

    const symbols = { INR: '₹', USD: '$', EUR: '€', GBP: '£' };

    function fmt(d) {
      const sym = symbols[d.currency] || '₹';
      return `${sym}${d.amount.toLocaleString('en-IN')}`;
    }

    function replayAlert() {
      const wrap = document.getElementById('alertWrap');
      wrap.classList.remove('entering');
      void wrap.offsetWidth; // force reflow
      wrap.classList.add('entering');
    }

    function toggleMedia() {
      mediaVisible = !mediaVisible;
      let mediaEl = document.querySelector('.la-media');

      if (mediaVisible) {
        if (!mediaEl) {
          mediaEl = document.createElement('div');
          mediaEl.className = 'la-media';
          mediaEl.innerHTML = '<img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=400&h=225&fit=crop" alt="media" />';
          document.querySelector('.la-wrap').appendChild(mediaEl);
        }
        mediaEl.style.display = 'block';
        setTimeout(() => mediaEl.classList.add('entering'), 10);
      } else {
        if (mediaEl) mediaEl.style.display = 'none';
      }
    }

    function cycleData() {
      currentIndex = (currentIndex + 1) % donations.length;
      const d = donations[currentIndex];

      document.querySelector('.la-name').textContent = d.name;
      document.querySelector('.la-amount').textContent = fmt(d);
      document.querySelector('.la-badge').textContent = d.badge;

      const msgEl = document.querySelector('.la-message');
      if (d.message) {
        msgEl.textContent = `"${d.message}"`;
        msgEl.style.display = 'block';
      } else {
        msgEl.style.display = 'none';
      }

      replayAlert();
    }
  </script>
</body>
</html>
