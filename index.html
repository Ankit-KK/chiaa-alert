<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latifa Neon Signature Alert</title>
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- GSAP & PixiJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>

  <style>
    /* ============================================================
       GLOBAL & STAGE
       ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
    }
    #root {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
    }

    .demo-controls {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 9999;
      background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
      padding: 12px; border-radius: 8px; font-family: 'Montserrat', sans-serif;
      backdrop-filter: blur(10px);
    }
    .demo-controls.visible { display: block; }
    .demo-controls button {
      background: linear-gradient(135deg, #F700FF, #00F0FF);
      color: #000; border: none; padding: 8px 16px; margin: 4px;
      border-radius: 20px; font-weight: 700; cursor: pointer;
      font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    }

    /* ============================================================
       MAIN CONTAINER
       ============================================================ */
    .signature-stage {
      position: relative;
      width: 600px;
      height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0; /* Hidden until GSAP starts */
    }

    /* ============================================================
       THE HERO: GLOWING SIGNATURE "L"
       ============================================================ */
    .signature-container {
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      width: 180px;
      height: 180px;
      z-index: 10;
      filter: drop-shadow(0 0 15px rgba(247, 0, 255, 0.6)) drop-shadow(0 0 30px rgba(0, 240, 255, 0.4));
    }
    
    .signature-path {
      fill: none;
      stroke: url(#neonGradient);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 600;
      stroke-dashoffset: 600;
    }

    /* ============================================================
       GLOSSY ACRYLIC CARD
       ============================================================ */
    .glass-card {
      position: absolute;
      left: 140px;
      top: 50%;
      transform: translateY(-50%) scale(0.9);
      width: 380px;
      padding: 30px 30px 30px 60px; /* Left padding makes room for the 'L' */
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      z-index: 5;
      opacity: 0;
      overflow: hidden;
    }

    /* Cinematic light sweep across the glass */
    .glass-sweep {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.15) 45%, rgba(255,255,255,0.05) 50%, transparent 55%);
      transform: translateX(-100%);
      pointer-events: none;
      z-index: 6;
    }

    /* ============================================================
       TYPOGRAPHY & CONTENT
       ============================================================ */
    .content-wrap {
      position: relative;
      z-index: 7;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .donor-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
    }

    .donor-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.5px;
      line-height: 1.1;
      overflow: hidden; /* For mask reveal */
    }
    
    .name-mask {
      display: inline-block;
      overflow: hidden;
    }
    
    .name-text {
      display: inline-block;
      transform: translateY(100%);
    }

    .amount-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-top: 4px;
      opacity: 0;
      transform: translateY(10px);
    }

    .donation-amount {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 300;
      background: linear-gradient(90deg, #F700FF, #00F0FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(247, 0, 255, 0.3));
    }

    .message-box {
      margin-top: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.5;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      opacity: 0;
      transform: translateY(10px);
    }

    /* ============================================================
       MEDIA SECTION (Borderless Glass)
       ============================================================ */
    .media-container {
      position: absolute;
      bottom: -100px; /* Positions it below the main card */
      left: 140px;
      width: 380px;
      height: 180px;
      z-index: 4;
      opacity: 0;
      transform: translateY(30px);
    }

    .media-glass {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .media-glass img, .media-glass video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.9;
    }

    /* ============================================================
       PIXIJS CANVAS (Ambient Light Leaks)
       ============================================================ */
    #ambient-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1; /* Behind the glass, in front of background */
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <div id="root">
    <canvas id="ambient-canvas"></canvas>
  </div>

  <div class="demo-controls" id="demoControls">
    <button onclick="triggerAlert(0)">Test: Media</button>
    <button onclick="triggerAlert(1)">Test: Text Only</button>
  </div>

  <script>
    // ============================================================
    // DATA
    // ============================================================
    const mockDonations = [
      { name: 'SniperKing', amount: 1500, currency: 'INR', message: 'Absolutely love the energy today! Keep dominating.', media_url: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400' },
      { name: 'LatifaFan_99', amount: 500, currency: 'INR', message: 'Best streamer on the platform, hands down.', media_url: null }
    ];
    
    let currentDonation = mockDonations[0];
    let masterTimeline = null;
    let countInterval = null;
    let pixiApp = null;

    // ============================================================
    // PIXIJS AMBIENT LIGHT LEAKS
    // ============================================================
    function initPixi() {
      const canvas = document.getElementById('ambient-canvas');
      pixiApp = new PIXI.Application({
        view: canvas,
        width: 800,
        height: 600,
        backgroundAlpha: 0,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true
      });

      // Create a soft, glowing orb texture
      const c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
      grad.addColorStop(0.3, 'rgba(247, 0, 255, 0.4)'); // Pink
      grad.addColorStop(0.6, 'rgba(0, 240, 255, 0.2)'); // Cyan
      grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 128, 128);
      const texture = PIXI.Texture.from(c);

      const container = new PIXI.Container();
      pixiApp.stage.addChild(container);
      container.x = 400; container.y = 300;

      const orbs = [];
      for (let i = 0; i < 8; i++) {
        const sprite = new PIXI.Sprite(texture);
        sprite.anchor.set(0.5);
        sprite.blendMode = PIXI.BLEND_MODES.ADD;
        sprite.alpha = 0;
        sprite.scale.set(1.5 + Math.random());
        container.addChild(sprite);
        
        orbs.push({
          sprite,
          active: false,
          angle: Math.random() * Math.PI * 2,
          radius: 150 + Math.random() * 200,
          speed: 0.002 + Math.random() * 0.003,
          yOffset: (Math.random() - 0.5) * 200
        });
      }

      window.startAmbientOrbs = () => {
        orbs.forEach(orb => {
          orb.active = true;
          orb.sprite.alpha = 0.3 + Math.random() * 0.4;
        });
      };

      window.stopAmbientOrbs = () => {
        orbs.forEach(orb => {
          orb.active = false;
          gsap.to(orb.sprite, { alpha: 0, duration: 1 });
        });
      };

      pixiApp.ticker.add(() => {
        orbs.forEach(orb => {
          if (orb.active) {
            orb.angle += orb.speed;
            // Figure-8 or circular drifting motion
            orb.sprite.x = Math.cos(orb.angle) * orb.radius;
            orb.sprite.y = Math.sin(orb.angle * 0.5) * (orb.radius * 0.5) + orb.yOffset;
            
            // Subtle pulsing
            const pulse = 1 + Math.sin(orb.angle * 3) * 0.1;
            orb.sprite.scale.set((1.5 + Math.random() * 0.5) * pulse);
          }
        });
      });
    }

    // ============================================================
    // RENDER SCENE
    // ============================================================
    function render(donation) {
      const symbol = { INR: '₹', USD: '$', EUR: '€', GBP: '£' }[donation.currency || 'INR'] || '₹';
      
      const mediaHtml = donation.media_url ? `
        <div class="media-container">
          <div class="media-glass">
            <img src="${donation.media_url}" alt="media" />
          </div>
        </div>
      ` : '';

      // Split name into masked characters for elegant reveal
      const nameStr = donation.name || 'Anonymous';
      const nameMasked = nameStr.split('').map(char => 
        `<span class="name-mask"><span class="name-text">${char === ' ' ? '&nbsp;' : char}</span></span>`
      ).join('');

      return `
        <div class="signature-stage">
          <!-- SVG DEFINITIONS -->
          <svg width="0" height="0">
            <defs>
              <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#F700FF" />
                <stop offset="100%" stop-color="#00F0FF" />
              </linearGradient>
            </defs>
          </svg>

          <!-- HERO SIGNATURE -->
          <div class="signature-container">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
              <!-- Elegant, flowing "L" path -->
              <path class="signature-path" d="M 25 20 C 25 20, 20 40, 35 50 C 50 60, 75 45, 75 45 C 75 45, 60 75, 30 80 C 20 82, 15 75, 15 75" />
            </svg>
          </div>

          <!-- GLOSSY CARD -->
          <div class="glass-card">
            <div class="glass-sweep"></div>
            <div class="content-wrap">
              <div class="donor-label">New Supporter</div>
              <div class="donor-name">${nameMasked}</div>
              <div class="amount-row">
                <div class="donation-amount" id="amountDisplay">${symbol}0</div>
              </div>
              ${donation.message ? `<div class="message-box">"${donation.message}"</div>` : ''}
            </div>
          </div>

          ${mediaHtml}
        </div>
      `;
    }

    // ============================================================
    // MICRO-CINEMATIC CHOREOGRAPHY
    // ============================================================
    function showAlert(donation) {
      if (masterTimeline) masterTimeline.kill();
      clearInterval(countInterval);
      window.stopAmbientOrbs?.();
      
      const root = document.getElementById('root');
      const canvas = document.getElementById('ambient-canvas');
      root.innerHTML = '';
      root.appendChild(canvas);
      root.insertAdjacentHTML('beforeend', render(donation));

      const stage = document.querySelector('.signature-stage');
      gsap.set(stage, { opacity: 1 });

      masterTimeline = gsap.timeline({ defaults: { ease: "power3.out" } });
      const targetAmount = donation.amount;
      const symbol = { INR: '₹', USD: '$', EUR: '€', GBP: '£' }[donation.currency || 'INR'] || '₹';

      // 0.0s: SIGNATURE DRAW (The Hero)
      masterTimeline.to(".signature-path", { 
        strokeDashoffset: 0, 
        duration: 1.2, 
        ease: "power2.inOut" 
      }, 0);

      // 0.3s: GLASS CARD MATERIALIZES (Elegant scale + fade)
      masterTimeline.to(".glass-card", { 
        opacity: 1, 
        scale: 1, 
        duration: 0.8, 
        ease: "expo.out" 
      }, 0.3);

      // 0.5s: LIGHT SWEEP ACROSS GLASS
      masterTimeline.to(".glass-sweep", { 
        x: "100%", 
        duration: 1.0, 
        ease: "power1.inOut" 
      }, 0.5);

      // 0.6s: TYPOGRAPHY REVEALS (Staggered, smooth)
      masterTimeline.to(".donor-label", { opacity: 1, y: 0, duration: 0.6 }, 0.6);
      
      // Name reveal: slide up from mask
      masterTimeline.to(".name-text", { 
        y: "0%", 
        duration: 0.7, 
        stagger: 0.03, 
        ease: "power3.out" 
      }, 0.7);

      // 0.9s: AMOUNT REVEAL + COUNT UP
      masterTimeline.to(".amount-row", { opacity: 1, y: 0, duration: 0.6 }, 0.9);
      
      const startTime = performance.now();
      countInterval = setInterval(() => {
        const elapsed = performance.now() - startTime;
        const progress = Math.min(elapsed / 1000, 1);
        const ease = 1 - Math.pow(1 - progress, 3); // Ease out cubic
        const current = Math.floor(ease * targetAmount);
        const el = document.getElementById('amountDisplay');
        if (el) el.textContent = `${symbol}${current.toLocaleString('en-IN')}`;
        
        if (progress >= 1) {
          clearInterval(countInterval);
          if (el) el.textContent = `${symbol}${targetAmount.toLocaleString('en-IN')}`;
        }
      }, 16);

      // 1.1s: MESSAGE REVEAL
      if (document.querySelector('.message-box')) {
        masterTimeline.to(".message-box", { opacity: 1, y: 0, duration: 0.6 }, 1.1);
      }

      // 1.3s: MEDIA REVEAL (If exists)
      if (document.querySelector('.media-container')) {
        masterTimeline.to(".media-container", { 
          opacity: 1, 
          y: 0, 
          duration: 0.8, 
          ease: "power3.out" 
        }, 1.3);
      }

      // 1.8s: TRANSITION TO AMBIENT IDLE
      masterTimeline.call(() => {
        window.startAmbientOrbs();
      }, null, 1.8);
    }

    function hideAlert() {
      const stage = document.querySelector('.signature-stage');
      if (!stage) return;
      if (masterTimeline) masterTimeline.kill();
      clearInterval(countInterval);
      window.stopAmbientOrbs?.();

      const exitTl = gsap.timeline({
        onComplete: () => {
          const canvas = document.getElementById('ambient-canvas');
          document.getElementById('root').innerHTML = '';
          document.getElementById('root').appendChild(canvas);
        }
      });

      // Elegant Exit: Reverse the elegance
      exitTl
        .to(".media-container", { opacity: 0, y: 20, duration: 0.4 }, 0)
        .to(".message-box, .amount-row", { opacity: 0, y: -10, duration: 0.4 }, 0.1)
        .to(".name-text", { y: "-100%", duration: 0.5, stagger: 0.02, ease: "power3.in" }, 0.2)
        .to(".donor-label", { opacity: 0, duration: 0.3 }, 0.2)
        .to(".glass-card", { opacity: 0, scale: 0.95, filter: "blur(10px)", duration: 0.6 }, 0.3)
        .to(".signature-path", { strokeDashoffset: 600, opacity: 0, duration: 0.8 }, 0.4);
    }

    function triggerAlert(index) {
      currentDonation = mockDonations[index];
      hideAlert();
      setTimeout(() => showAlert(currentDonation), 1000);
    }

    // ============================================================
    // INIT
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
      initPixi();
      if (new URLSearchParams(window.location.search).get('demo') === '1') {
        document.getElementById('demoControls').classList.add('visible');
      }
      setTimeout(() => showAlert(currentDonation), 500);
    });
  </script>
</body>
</html>
